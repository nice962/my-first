<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试练习网站 - 电商后台</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .nav { margin-bottom: 20px; }
        .nav button { margin-right: 10px; padding: 8px 16px; cursor: pointer; }
        .product, .cart-item { border: 1px solid #ddd; margin: 10px 0; padding: 10px; display: flex; justify-content: space-between; }
        .cart { margin-top: 20px; }
        .error { color: red; }
        .success { color: green; }
        input, select { padding: 5px; margin: 5px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>测试练习网站 - 电商后台（模拟）</h1>
    <div class="nav">
        <button onclick="showPage('login')">登录</button>
        <button onclick="showPage('products')">商品列表</button>
        <button onclick="showPage('cart')">购物车</button>
        <button onclick="showPage('orders')">我的订单</button>
    </div>
    <div id="page-content">
        <!-- 动态内容 -->
    </div>
</div>

<script>
    // 模拟数据存储
    let currentUser = null;
    let products = [
        { id: 1, name: "测试手机", price: 1999, stock: 10 },
        { id: 2, name: "测试电脑", price: 4999, stock: 5 },
        { id: 3, name: "测试耳机", price: 299, stock: 20 }
    ];
    let cart = []; // { productId, quantity }
    let orders = [];

    // 辅助函数
    function saveData() {
        localStorage.setItem('cart', JSON.stringify(cart));
        localStorage.setItem('orders', JSON.stringify(orders));
        localStorage.setItem('products', JSON.stringify(products));
    }
    function loadData() {
        let savedCart = localStorage.getItem('cart');
        if (savedCart) cart = JSON.parse(savedCart);
        let savedOrders = localStorage.getItem('orders');
        if (savedOrders) orders = JSON.parse(savedOrders);
        let savedProducts = localStorage.getItem('products');
        if (savedProducts) products = JSON.parse(savedProducts);
    }
    loadData();

    // 页面切换
    function showPage(page) {
        const contentDiv = document.getElementById('page-content');
        if (page === 'login') {
            contentDiv.innerHTML = `
                <h2>登录</h2>
                <div>
                    <label>用户名：<input type="text" id="username" placeholder="admin" /></label><br/>
                    <label>密码：<input type="password" id="password" placeholder="123456" /></label><br/>
                    <button onclick="doLogin()">登录</button>
                    <p class="error" id="loginError"></p >
                    <p>测试账号：admin / 123456</p >
                </div>
            `;
        } else if (page === 'products') {
            if (!currentUser) { alert('请先登录'); showPage('login'); return; }
            renderProducts();
        } else if (page === 'cart') {
            if (!currentUser) { alert('请先登录'); showPage('login'); return; }
            renderCart();
        } else if (page === 'orders') {
            if (!currentUser) { alert('请先登录'); showPage('login'); return; }
            renderOrders();
        }
    }

    function doLogin() {
        let username = document.getElementById('username').value;
        let password = document.getElementById('password').value;
        // 模拟后端验证
        if (username === 'admin' && password === '123456') {
            currentUser = { username: 'admin', role: 'admin' };
            document.getElementById('loginError').innerText = '';
            alert('登录成功');
            showPage('products');
        } else {
            document.getElementById('loginError').innerText = '用户名或密码错误';
        }
    }

    function renderProducts() {
        const container = document.getElementById('page-content');
        let html = `<h2>商品列表</h2>
                    <div>
                        <label>排序：<select id="sortSelect" onchange="sortProducts()">
                            <option value="default">默认</option>
                            <option value="priceAsc">价格升序</option>
                            <option value="priceDesc">价格降序</option>
                        </select></label>
                    </div>
                    <div id="productList"></div>`;
        container.innerHTML = html;
        displayProducts();
    }

    function displayProducts() {
        let sort = document.getElementById('sortSelect')?.value || 'default';
        let sortedProducts = [...products];
        if (sort === 'priceAsc') sortedProducts.sort((a,b) => a.price - b.price);
        if (sort === 'priceDesc') sortedProducts.sort((a,b) => b.price - a.price);
        let listDiv = document.getElementById('productList');
        if (!listDiv) return;
        listDiv.innerHTML = sortedProducts.map(p => `
            <div class="product">
                <span>${p.name} - ￥${p.price} (库存:${p.stock})</span>
                <button onclick="addToCart(${p.id})">加入购物车</button>
            </div>
        `).join('');
    }

    function sortProducts() {
        displayProducts();
    }

    function addToCart(productId) {
        let product = products.find(p => p.id === productId);
        if (!product) return;
        let existing = cart.find(item => item.productId === productId);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ productId, quantity: 1 });
        }
        saveData();
        alert(`已添加 ${product.name} 到购物车`);
    }

    function renderCart() {
        let container = document.getElementById('page-content');
        if (cart.length === 0) {
            container.innerHTML = `<h2>购物车</h2><p>购物车为空</p ><button onclick="showPage('products')">去购物</button>`;
            return;
        }
        let cartItemsHtml = cart.map(item => {
            let product = products.find(p => p.id === item.productId);
            if (!product) return '';
            return `
                <div class="cart-item">
                    <span>${product.name} - ￥${product.price} x ${item.quantity}</span>
                    <button onclick="updateCart(${item.productId}, -1)">-</button>
                    <button onclick="updateCart(${item.productId}, 1)">+</button>
                    <button onclick="removeFromCart(${item.productId})">删除</button>
                </div>
            `;
        }).join('');
        let total = cart.reduce((sum, item) => {
            let p = products.find(p => p.id === item.productId);
            return sum + (p ? p.price * item.quantity : 0);
        }, 0);
        container.innerHTML = `
            <h2>购物车</h2>
            <div id="cartItems">${cartItemsHtml}</div>
            <p>总价：￥${total}</p >
            <button onclick="checkout()">去结算</button>
            <button onclick="showPage('products')">继续购物</button>
        `;
    }

    function updateCart(productId, delta) {
        let item = cart.find(i => i.productId === productId);
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) {
                cart = cart.filter(i => i.productId !== productId);
            }
            saveData();
            renderCart();
        }
    }

    function removeFromCart(productId) {
        cart = cart.filter(i => i.productId !== productId);
        saveData();
        renderCart();
    }

    function checkout() {
        if (cart.length === 0) {
            alert('购物车为空');
            return;
        }
        // 模拟创建订单
        let orderId = Date.now();
        let total = cart.reduce((sum, item) => {
            let p = products.find(p => p.id === item.productId);
            return sum + (p ? p.price * item.quantity : 0);
        }, 0);
        let newOrder = {
            orderId: orderId,
            items: [...cart],
            total: total,
            status: '待支付',
            createTime: new Date().toISOString()
        };
        orders.push(newOrder);
        // 扣减库存（模拟）
        cart.forEach(item => {
            let product = products.find(p => p.id === item.productId);
            if (product) product.stock -= item.quantity;
        });
        cart = [];
        saveData();
        alert(`订单创建成功，订单号：${orderId}`);
        showPage('orders');
    }

    function renderOrders() {
        let container = document.getElementById('page-content');
        if (orders.length === 0) {
            container.innerHTML = `<h2>我的订单</h2><p>暂无订单</p >`;
            return;
        }
        let ordersHtml = orders.map(order => `
            <div style="border:1px solid #ccc; margin:10px; padding:10px;">
                <h4>订单号：${order.orderId}</h4>
                <p>总金额：￥${order.total}</p >
                <p>状态：${order.status}</p >
                <p>创建时间：${order.createTime}</p >
                <button onclick="cancelOrder('${order.orderId}')">取消订单</button>
            </div>
        `).join('');
        container.innerHTML = `<h2>我的订单</h2>${ordersHtml}`;
    }

    function cancelOrder(orderId) {
        orders = orders.filter(o => o.orderId != orderId);
        saveData();
        renderOrders();
    }

    // 初始显示登录页
    showPage('login');
</script>
</body>
</html>
